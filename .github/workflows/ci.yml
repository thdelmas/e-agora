name: CI

# Gate every push and PR to main / the deploy branch before Render auto-deploys.
# Mirrors the local Makefile targets (make test / make build / make prod-build).
on:
  push:
    branches: [main, app-and-free-deploy]
  pull_request:
    branches: [main, app-and-free-deploy]

# A newer push to the same ref cancels the in-flight run for that ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    name: File size limits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fails on files >500 lines or any line >80 cols; warns above 250 lines.
      - name: Check file dimensions
        run: ./scripts/check-file-size.sh

  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # A throwaway PostgreSQL so DB-backed tests (e.g. the RandomPair draw, whose
    # SQL only fails against a real engine) actually run instead of skipping.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eagora
          POSTGRES_PASSWORD: eagora
          POSTGRES_DB: eagora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eagora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      EAGORA_TEST_DSN: postgres://eagora:eagora@localhost:5432/eagora_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: gofmt (check, no rewrite)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  frontend:
    name: Frontend (Vue/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Prod image (Dockerfile.prod)
    runs-on: ubuntu-latest
    # Only the deploy branches actually ship this image, and it rebuilds what
    # the backend/frontend jobs already cover. Skip it on PRs (event_name is
    # 'push' only for main / app-and-free-deploy per the trigger filter above)
    # to avoid paying for the heaviest job on every feature-branch run.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Builds the same single image Render deploys, catching prod-build
      # breakage here instead of at deploy time. Build only (not pushed).
      - name: Build production image
        run: docker build -f Dockerfile.prod -t e-agora:ci .
