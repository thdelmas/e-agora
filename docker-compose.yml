# e-agora local stack.
#   make dev                  # build + run db + backend + frontend
#   docker compose up -d db   # just Postgres (run app on the host instead)
#   docker compose down       # stop (data persists in the named volume)
#
# Once up:  frontend → http://localhost:5173   backend → http://localhost:8080/api/healthz
services:
  db:
    image: postgres:16-alpine
    container_name: eagora-db
    environment:
      POSTGRES_USER: eagora
      POSTGRES_PASSWORD: eagora
      POSTGRES_DB: eagora
    ports:
      - "5432:5432"
    volumes:
      - eagora_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eagora -d eagora"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: eagora-backend
    environment:
      EAGORA_ADDR: ":8080"
      DATABASE_URL: postgres://eagora:eagora@db:5432/eagora?sslmode=disable
      # Dev secret only — set a real one in production.
      EAGORA_TOKEN_SECRET: dev-insecure-change-me
      # auto: seed the pool from Wikidata/Wikipedia on first boot (background;
      # needs network). Set to "off" to skip.
      EAGORA_SEED: auto
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: eagora-frontend
    environment:
      # Vite proxies /api to the backend service (see vite.config.js).
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  eagora_pgdata:
